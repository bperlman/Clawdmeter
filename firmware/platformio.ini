; ============================================================================
; Shared LVGL + NimBLE build flags. Boards extend this with board-specific
; flags and src filters below.
; ============================================================================
[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
framework = arduino
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; NimBLE config — peripheral-only, single connection
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1

; ============================================================================
; Waveshare ESP32-S3-Touch-AMOLED-2.16 (480×480 CO5300 + CST9220 + AXP2101 + QMI8658)
; ============================================================================
[env:waveshare_amoled_216]
extends = common
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi

build_flags =
    ${common.build_flags}
    -DBOARD_HAS_PSRAM
    -DCLAWDMETER_BOARD_AMOLED
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101

lib_deps =
    ${common.lib_deps}
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7

; Exclude T-Display variants of the board-specific files.
build_src_filter =
    +<*>
    -<main_tdisplay.cpp>
    -<ui_tdisplay.cpp>

; ============================================================================
; LilyGO T-Display S3 (320×170 ST7789 8080 parallel, 2 buttons, no touch/PMU/IMU)
; ============================================================================
[env:lilygo_tdisplay_s3]
extends = common
; Using the generic ESP32-S3 devkit board because the pioarduino platform
; manifest doesn't reliably ship a `lilygo-t-display-s3` board file. The
; T-Display S3 N16R8 variant has 16 MB Flash + 8 MB OPI PSRAM — qio_opi
; matches the OPI octal PSRAM wiring.
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

build_flags =
    ${common.build_flags}
    -DBOARD_HAS_PSRAM
    -DCLAWDMETER_BOARD_TDISPLAY_S3
    ; Arduino_GFX uses these to enable LCD_CAM i80 parallel backend on ESP32-S3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ${common.lib_deps}

; Exclude AMOLED-only files: hardware drivers that have no equivalent on
; T-Display (PMU, IMU) and the AMOLED-specific main/ui.
build_src_filter =
    +<*>
    -<main.cpp>
    -<ui.cpp>
    -<imu.cpp>
    -<power.cpp>
